name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-posix:
    name: backend (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r requirements.txt
      - run: pytest -q

  backend-windows:
    name: backend (Windows / pywinpty)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r requirements.txt
      - run: pip install pywinpty==2.0.14
      - run: pytest -q

  app:
    name: flutter app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: stable
      - run: flutter pub get
        working-directory: app
      - run: flutter analyze
        working-directory: app
      - run: flutter test
        working-directory: app
